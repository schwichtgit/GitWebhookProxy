# Generated from /kubernetes/templates/chart/values.yaml.tmpl

kubernetes:

gitWebhookProxy:
  replicas: 1
  useCustomName: false
  customName: gitlabwebhookproxy
  # name of existing secret containing secret for hashes
  existingSecretName: ""
  labels:
    provider: stakater
    group: com.stakater.platform
    version: v0.2.80
  image:
    name: stakater/gitwebhookproxy
    tag: "v0.2.80"
    pullPolicy: IfNotPresent
  # Resource limits and requests
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  config:
    # Provider configuration with defaults
    # Supported values: github, gitlab, bitbucket
    provider: github
    # Upstream service URL to forward webhooks to
    upstreamURL: "https://jenkins.tools.stackator.com"
    # Comma-separated list of allowed webhook paths
    allowedPaths: "/github-webhook,/project"
    # Secret for webhook validation
    secret: ""
    # Rate limiting configuration
    rateLimit:
      enabled: true
      requestsPerSecond: 10
      burstSize: 20
    # User filtering configuration
    ignoredUsers: "stakater-user"
    allowedUsers: "myuser"
    # Retry configuration for failed webhook deliveries
    retry:
      enabled: true
      maxRetries: 3
      initialDelay: "5s"
      maxDelay: "1m"
  service:
    labels:
      expose: "true"
    annotations: {}
    ports:
      - name: http
        port: 8080
        protocol: TCP
        targetPort: 8080
        servicePort: 80
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
  podSecurityContext:
    runAsUser: 1001
    runAsNonRoot: true
  ingress:
    enabled: false
    annotations:
      ingress.kubernetes.io/force-ssl-redirect: "true"
      kubernetes.io/ingress.class: external-ingress
      monitor.stakater.com/enabled: "true"
    host: gitwebhookproxy.tools.stackator.com
    tlsSecretName: ""
    serviceName: gitwebhookproxy
    servicePort: 80
    # GCP specific configurations
    gcp:
      # Enable GCP FrontendConfig
      enabled: false
      # Name of the FrontendConfig resource
      name: ""
      # Backend configuration
      backend:
        # Enable backend configuration
        enabled: false
        # Name of the backend service
        name: ""
        # Health check configuration
        healthCheck:
          # Enable health check
          enabled: true
          # Health check configuration with optimized defaults
          checkIntervalSec: 10
          timeoutSec: 3
          healthyThreshold: 2
          unhealthyThreshold: 3
          type: HTTP
          port: 8080
          requestPath: "/health"
          # Additional health check configuration
          # https://cloud.google.com/kubernetes-engine/docs/how-to/ingress-features#direct_health
          proxyHeader: NONE
          # Response codes considered healthy (optional)
          healthyCodes: "200-399"
          # Custom request headers (optional)
          requestHeaders: []
          # Health check logging configuration
          logConfig:
            enabled: true
            # Log sample rate (0.0-1.0)
            sampleRate: 0.1
      # SSL policy configuration
      sslPolicy:
        # Enable SSL policy
        enabled: false
        # Name of the SSL policy
        name: "modern-ssl-policy"
      # Redirect configuration
      redirects:
        enabled: false
        # Redirect configurations
        # https://cloud.google.com/kubernetes-engine/docs/how-to/ingress-features#https_redirect
        type: PERMANENT_REDIRECT
        responseCode: MOVED_PERMANENTLY_DEFAULT
