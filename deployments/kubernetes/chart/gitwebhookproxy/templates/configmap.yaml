apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
  labels:
{{ include "gitwebhookproxy.labels.stakater" . | indent 4 }}
{{ include "gitwebhookproxy.labels.chart" . | indent 4 }}
{{- if .Values.gitWebhookProxy.useCustomName }}
  name: {{ .Values.gitWebhookProxy.customName }}
{{- else }}
  name: {{ template "gitwebhookproxy.name" . }}
{{- end }}
data:
    {{- with .Values.gitWebhookProxy.config.provider }}
    provider: {{ . }}
    {{- end }}
    upstreamURL: {{ .Values.gitWebhookProxy.config.upstreamURL }}
    {{- with .Values.gitWebhookProxy.config.allowedPaths }}
    allowedPaths: {{ . }}
    {{- end }}
    ignoredUsers: {{ .Values.gitWebhookProxy.config.ignoredUsers | default "" | quote }}
    allowedUsers: {{ .Values.gitWebhookProxy.config.allowedUsers | default "" | quote }}

    {{- if .Values.gitWebhookProxy.config.rateLimit.enabled }}
    # Rate limiting configuration
    rateLimitEnabled: "true"
    rateLimitRequestsPerSecond: {{ .Values.gitWebhookProxy.config.rateLimit.requestsPerSecond | quote }}
    rateLimitBurstSize: {{ .Values.gitWebhookProxy.config.rateLimit.burstSize | quote }}
    {{- end }}

    {{- if .Values.gitWebhookProxy.config.retry.enabled }}
    # Retry configuration
    retryEnabled: "true"
    retryMaxRetries: {{ .Values.gitWebhookProxy.config.retry.maxRetries | quote }}
    retryInitialDelay: {{ .Values.gitWebhookProxy.config.retry.initialDelay | quote }}
    retryMaxDelay: {{ .Values.gitWebhookProxy.config.retry.maxDelay | quote }}
    {{- end }}
